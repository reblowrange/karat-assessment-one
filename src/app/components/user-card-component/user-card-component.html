<mat-card appearance="outlined" style="width: 400px;">
    <mat-card-header>
        <mat-card-title> User Details</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <strong>Name:</strong> {{user.name}}<br/>
        <strong>Email:</strong> {{user.email}}
    </mat-card-content>
</mat-card>
<br/>
<button (click)="generateRandomId()" matButton="filled">Generate random ID</button>
